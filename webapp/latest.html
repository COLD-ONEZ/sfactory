<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Latest Added</title>
  
<style>

*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0
}

:root{
  --bg:#050816;
  --surface:rgba(18,22,40,.72);
  --card:rgba(16,20,36,.82);
  --border:rgba(255,255,255,.08);

  --accent:#ff4fa3;
  --accent2:#7a5cff;
  --accent3:#4da3ff;

  --text:#f4f7ff;
  --muted:#97a1ba;

  --radius:28px;
  --shadow:
    0 15px 40px rgba(0,0,0,.45),
    0 0 30px rgba(122,92,255,.08);
}

body{
  background:
    radial-gradient(circle at top left,
      rgba(122,92,255,.22),
      transparent 35%),

    radial-gradient(circle at top right,
      rgba(255,79,163,.18),
      transparent 28%),

    linear-gradient(
      180deg,
      #040714,
      #08101f 40%,
      #050816
    );

  color:var(--text);

  font-family:
    Inter,
    -apple-system,
    BlinkMacSystemFont,
    'Segoe UI',
    sans-serif;

  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:120px;
}

#loading{
  position:fixed;
  inset:0;
  background:#050816;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  z-index:1000;
}

.ring{
  width:54px;
  height:54px;
  border:4px solid rgba(255,255,255,.08);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
  box-shadow:0 0 18px rgba(255,79,163,.35);
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

#loading p{
  color:var(--muted);
  font-size:14px;
}

.search-wrap{
  padding:16px;
  position:sticky;
  top:0;
  z-index:20;
  backdrop-filter:blur(20px);
  background:rgba(5,8,22,.72);
}

.search-box{
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(18,22,40,.78);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:18px 20px;
  box-shadow:var(--shadow);
}

.search-box input{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:var(--text);
  font-size:16px;
}

.search-box input::placeholder{
  color:#7f89a8;
}

.search-icon,
.clear-btn{
  color:#aab2c5;
  font-size:18px;
}

.clear-btn{
  background:none;
  border:none;
  cursor:pointer;
  display:none;
}

.date-group{
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px 20px 10px;
  font-size:13px;
  font-weight:800;
  color:#b7bfd5;
  letter-spacing:1.4px;
  text-transform:uppercase;
}

.date-group::before{
  content:'';
  width:10px;
  height:10px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 15px rgba(255,79,163,.55);
}

.card{
  position:relative;
  display:flex;
  align-items:center;
  gap:0;
  margin:12px 16px;
  border-radius:28px;
  background:linear-gradient(135deg,rgba(28,32,52,.96),rgba(12,15,28,.92));
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
  cursor:pointer;
  transition:.28s ease;
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
  min-height:112px;
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.05),transparent);
  transform:translateX(-100%);
  transition:1s;
}

.card:hover::before{
  transform:translateX(100%);
}

.card:hover{
  transform:translateY(-3px) scale(1.01);
}

.card.selected{
  border-color:rgba(255,79,163,.55);
  box-shadow:
    0 0 0 1px rgba(255,79,163,.2),
    0 15px 35px rgba(255,79,163,.18);
}


.card-poster,
.card-poster-fallback{
  width:112px;
  height:112px;
  flex-shrink:0;
  border-radius:0;
}


.card-poster{
  object-fit:cover;
}

.card-poster-fallback{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111827;
  color:#6b7280;
  font-size:28px;
}

.card-divider{
  width:1px;
  height:90px;
  background:linear-gradient(to bottom,transparent,rgba(255,255,255,.14),transparent);
}

.card-info{
  flex:1;
  padding:14px 16px;
  min-width:0;
}


.card-title{
  font-size:21px;
  font-weight:700;
  line-height:1.25;
  letter-spacing:-.3px;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}


.card-sub{
  margin-top:8px;
  font-size:14px;
  color:#95a0bc;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}


.card-badge{
  margin-right:14px;
  padding:11px 15px;
  border-radius:18px;
  background:rgba(255,79,163,.10);
  border:1px solid rgba(255,79,163,.35);
  color:#ff77b7;
  font-size:17px;
  font-weight:800;
  min-width:92px;
  text-align:center;
  box-shadow:
    0 0 20px rgba(255,79,163,.18);
}

.quality-badge{
  padding:4px 10px;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  color:#d5d9e7;
  font-size:12px;
  font-weight:700;
  letter-spacing:.3px;
}

.status-badge{
  padding:3px 9px;
  border-radius:10px;
  font-size:11px;
  font-weight:800;
  letter-spacing:.5px;
  text-transform:uppercase;
}
.status-badge.ongoing{
  background:rgba(255,160,50,.12);
  border:1px solid rgba(255,160,50,.40);
  color:#ffb347;
}
.status-badge.finished{
  background:rgba(50,220,120,.12);
  border:1px solid rgba(50,220,120,.40);
  color:#3ddb82;
}


.empty{
  padding:60px 24px;
  text-align:center;
  color:var(--muted);
}

.empty-icon{
  font-size:48px;
  margin-bottom:14px;
}

.empty p{
  font-size:15px;
  line-height:1.6;
}

#action-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:18px;
  background:rgba(5,8,22,.84);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.08);
  display:none;
}

#action-bar.show{
  display:flex;
  gap:12px;
}

.action-btn{
  flex:1;
  padding:20px;
  border:none;
  border-radius:24px;
  font-size:20px;
  font-weight:800;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(135deg,#ff3f92,#ff5ba8,#7a5cff);
  box-shadow:
    0 15px 30px rgba(255,79,163,.28),
    0 0 25px rgba(122,92,255,.15);
}

.action-btn:active{
  transform:scale(.98);
}

.sk{
  background:linear-gradient(90deg,#111827 25%,#1f2937 50%,#111827 75%);
  background-size:200% 100%;
  animation:sh 1.2s infinite;
}

@keyframes sh{
  to{background-position:-200% 0}
}

.sk-card{
  height:120px;
  margin:12px 16px;
  border-radius:30px;
}

.sk-label{
  height:14px;
  width:120px;
  margin:18px 18px 8px;
  border-radius:999px;
}

#toast{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(12,14,26,.95);
  color:#fff;
  padding:14px 20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  opacity:0;
  pointer-events:none;
  transition:opacity .25s;
  z-index:999;
  box-shadow:0 10px 30px rgba(0,0,0,.45);
}

</style>

</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="ring"></div>
  <p>Loading latest…</p>
</div>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input id="search-input" type="text" placeholder="Search series, season, year…" autocomplete="off"/>
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- Content -->
<div id="content"></div>

<!-- Action bar -->
<div id="action-bar">
  <button class="action-btn" id="get-btn" onclick="getFile()">Get File</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }

// allEntries = the current 50 recent entries (homepage)
// displayedEntries = whatever is currently rendered (recent or search results)
let allEntries = [];
let displayedEntries = [];
let selectedEntry = null;
let searchTimeout = null;
let isSearchMode = false;

// ── Date grouping ────────────────────────────────────────────────────────────
function groupByDate(entries){
  const today = new Date();
  today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);

  const groups = {};
  entries.forEach(e => {
    const dt = e.added_at ? new Date(e.added_at) : null;
    let label;
    if(!dt){ label = 'Older'; }
    else {
      const d = new Date(dt); d.setHours(0,0,0,0);
      if(d.getTime() === today.getTime()) label = 'Today Uploads';
      else if(d.getTime() === yesterday.getTime()) label = 'Yesterday';
      else label = d.toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric'});
    }
    if(!groups[label]) groups[label] = [];
    groups[label].push(e);
  });
  return groups;
}

// ── Card HTML ────────────────────────────────────────────────────────────────
function cardHTML(e){
  const poster = e.poster_url
    ? `<img class="card-poster" src="${e.poster_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-poster-fallback" style="display:none">🎬</div>`
    : `<div class="card-poster-fallback">🎬</div>`;

  const quality = e.quality || '';
  const status  = (e.series_status || '').toUpperCase();

  const subItems = [];
  if(e.year && quality){
    subItems.push(`<span>${esc(e.year)} | ${esc(quality)}</span>`);
  } else if(e.year){
    subItems.push(`<span>${esc(e.year)}</span>`);
  } else if(quality){
    subItems.push(`<span class="quality-badge">${esc(quality)}</span>`);
  }

  if(status === 'ONGOING'){
    subItems.push(`<span class="status-badge ongoing">Ongoing</span>`);
  } else if(status === 'FINISHED'){
    subItems.push(`<span class="status-badge finished">Finished</span>`);
  }

  return `
  <div class="card${selectedEntry && selectedEntry.series_id === e.series_id ? ' selected' : ''}" id="card-${e.series_id}" onclick="selectCard('${e.series_id}')">
    ${poster}
    <div class="card-divider"></div>

    <div class="card-info">
      <div class="card-title">${esc(e.title)}</div>

      <div class="card-sub">
        ${subItems.join('')}
      </div>
    </div>

    <div class="card-badge">${esc(e.info_str||'')}</div>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(entries, sectionLabel){
  const content = document.getElementById('content');
  if(!entries.length){
    content.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>${isSearchMode ? 'No matching series found.' : 'No series found.<br>Check back after new uploads!'}</p></div>`;
    return;
  }

  let html = '';

  if(sectionLabel){
    // Search results — show a flat labeled section instead of date groups
    html += `<div class="date-group">${esc(sectionLabel)}</div>`;
    entries.forEach(e => { html += cardHTML(e); });
  } else {
    // Recent list — group by date
    const groups = groupByDate(entries);
    for(const [label, items] of Object.entries(groups)){
      html += `<div class="date-group">${esc(label)}</div>`;
      items.forEach(e => { html += cardHTML(e); });
    }
  }

  content.innerHTML = html;
}

function renderSkeleton(){
  const content = document.getElementById('content');
  let html = '<div class="sk sk-label"></div>';
  for(let i=0;i<5;i++) html += '<div class="sk sk-card"></div>';
  html += '<div class="sk sk-label" style="margin-top:18px"></div>';
  for(let i=0;i<3;i++) html += '<div class="sk sk-card"></div>';
  content.innerHTML = html;
}

// ── Fetch ────────────────────────────────────────────────────────────────────
async function load(){
  renderSkeleton();
  try{
    const r = await fetch('/api/latest');
    const data = await r.json();
    allEntries = data.entries || [];
    displayedEntries = allEntries;
    render(allEntries, null);
  } catch(e){
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load. Please retry.</p></div>`;
  }
  document.getElementById('loading').style.display='none';
}

// ── Search ───────────────────────────────────────────────────────────────────
// FIX: Now calls /api/search/latest which searches the FULL database,
// not just the 50 recent entries. Results use same card design.
document.getElementById('search-input').addEventListener('input', function(){
  const q = this.value.trim();
  document.getElementById('clear-btn').style.display = q ? 'block' : 'none';
  clearTimeout(searchTimeout);

  if(!q){
    isSearchMode = false;
    displayedEntries = allEntries;
    render(allEntries, null);
    return;
  }

  isSearchMode = true;
  searchTimeout = setTimeout(() => doSearch(q), 300);
});

async function doSearch(q){
  // Show skeleton while fetching
  document.getElementById('content').innerHTML =
    '<div class="sk sk-label"></div><div class="sk sk-card"></div><div class="sk sk-card"></div><div class="sk sk-card"></div>';

  try {
    const r = await fetch(`/api/search/latest?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    displayedEntries = data.entries || [];
    render(displayedEntries, `Search results for "${q}"`);

    // Restore selection highlight if still visible
    if(selectedEntry){
      const el = document.getElementById('card-' + selectedEntry.series_id);
      if(el) el.classList.add('selected');
    }
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>Search failed. Please retry.</p></div>`;
  }
}

function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('clear-btn').style.display='none';
  isSearchMode = false;
  displayedEntries = allEntries;
  render(allEntries, null);
}

// ── Selection ────────────────────────────────────────────────────────────────
// FIX: selectCard now looks in displayedEntries (search results OR recent list)
// so selecting a search result card always works correctly.
function selectCard(seriesId){
  // Look in displayed entries first, fall back to allEntries
  let entry = displayedEntries.find(e => e.series_id === seriesId);
  if(!entry) entry = allEntries.find(e => e.series_id === seriesId);
  if(!entry) return;

  // Deselect previous
  document.querySelectorAll('.card.selected').forEach(el => el.classList.remove('selected'));

  if(selectedEntry?.series_id === seriesId){
    // Toggle off
    selectedEntry = null;
    hideActionBar();
    return;
  }

  selectedEntry = entry;
  const el = document.getElementById('card-' + seriesId);
  if(el) el.classList.add('selected');

  // Update button label based on entry type
  const btn = document.getElementById('get-btn');
  btn.textContent = entry.is_season ? 'Get Files' : 'Get File';

  showActionBar();
}

function showActionBar(){
  document.getElementById('action-bar').classList.add('show');
}

function hideActionBar(){
  document.getElementById('action-bar').classList.remove('show');
}

// ── File delivery ─────────────────────────────────────────────────────────────
// FIX: Backend now handles old entries without pre-computed links by falling
// back to series_db. The error "No links available" should no longer appear
// for published series that have proper batch/file links stored.
async function getFile(){
  if(!selectedEntry) return;

  try{
    const linkType = selectedEntry.is_season ? 'batch' : 'file';
    const r = await fetch(`/api/file/get?series_id=${encodeURIComponent(selectedEntry.series_id)}&link_type=${linkType}`);
    const data = await r.json();

    if(data.ok && data.bot_link){
      if(tg){ tg.openTelegramLink(data.bot_link); }
      else { window.open(data.bot_link,'_blank'); }
      showToast(`Opening bot to send ${selectedEntry.is_season ? 'files' : 'file'}…`);
    } else {
      showToast(data.error || 'No file available yet.');
    }
  } catch(err){
    showToast('Something went wrong. Try again.');
  }
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, duration=2800){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity='1';
  setTimeout(()=>{ t.style.opacity='0'; }, duration);
}

// ── Escape ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Init ─────────────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
